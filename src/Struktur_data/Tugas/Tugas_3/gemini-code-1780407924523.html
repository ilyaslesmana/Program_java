<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Traversal Visualizer</title>
    <!-- Menambahkan Tabler Icons untuk UI yang lebih profesional -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
    <style>
        :root {
            --color-background-primary: #ffffff;
            --color-background-secondary: #f4f4f5;
            --color-background-info: #e0f2fe;
            --color-border-secondary: #d4d4d8;
            --color-border-tertiary: #e4e4e7;
            --color-border-info: #7dd3fc;
            --color-text-primary: #18181b;
            --color-text-secondary: #52525b;
            --color-text-info: #0284c7;
            --color-text-success: #16a34a;
            --border-radius-md: 6px;
            --border-radius-lg: 10px;
            --font-sans: 'Segoe UI', system-ui, sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-sans); }
        body { background-color: #f8fafc; display: flex; justify-content: center; padding: 2rem; }
        
        #app { 
            width: 100%; 
            max-width: 720px; 
            background: var(--color-background-primary); 
            padding: 24px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); 
        }

        h2.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
        
        .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .controls label { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); display: flex; align-items: center; gap: 6px; }
        .controls select { font-size: 13px; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--color-border-secondary); }
        
        .btn-group { display: flex; gap: 6px; }
        button { 
            font-size: 13px; font-weight: 500; padding: 6px 14px; 
            border: 1px solid var(--color-border-secondary); 
            border-radius: var(--border-radius-md); 
            background: var(--color-background-primary); 
            color: var(--color-text-primary); 
            cursor: pointer; transition: all .15s ease-in-out; 
            display: flex; align-items: center; gap: 4px;
        }
        button:hover:not(:disabled) { background: var(--color-background-secondary); }
        button.active { background: var(--color-background-info); border-color: var(--color-border-info); color: var(--color-text-info); }
        button:disabled { opacity: .4; cursor: not-allowed; }

        .canvas-wrap { border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; background: #fafafa; }
        canvas { display: block; width: 100%; }

        .status-bar { display: flex; gap: 16px; margin-top: 12px; font-size: 12px; font-weight: 500; color: var(--color-text-secondary); flex-wrap: wrap; }
        .status-bar span { display: flex; align-items: center; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

        .log-area { display: flex; gap: 12px; margin-top: 1.5rem; }
        .log-box { 
            flex: 1; border: 1px solid var(--color-border-tertiary); 
            border-radius: var(--border-radius-md); padding: 12px; 
            min-height: 140px; font-size: 12px; font-family: var(--font-mono); 
            color: var(--color-text-secondary); background: var(--color-background-secondary); 
            overflow-y: auto; max-height: 200px; 
        }
        .log-box h3 { font-family: var(--font-sans); font-size: 13px; font-weight: 600; color: var(--color-text-primary); margin-bottom: 8px; border-bottom: 1px solid var(--color-border-tertiary); padding-bottom: 4px; }
        .log-entry { line-height: 1.6; margin-bottom: 2px; }
        .log-entry.found { color: var(--color-text-success); font-weight: bold; background: #dcfce7; padding: 2px 6px; border-radius: 4px; display: inline-block; }
        .log-entry.scan { color: var(--color-text-info); font-weight: 600; }
    </style>
</head>
<body>

<div id="app">
  <h2 class="sr-only">Graph traversal visualizer dengan undo, menampilkan DFS dan BFS pada graf 10 node</h2>

  <div class="controls">
    <div class="btn-group">
      <button id="btn-dfs" class="active" onclick="setAlgo('dfs')">DFS</button>
      <button id="btn-bfs" onclick="setAlgo('bfs')">BFS</button>
    </div>
    <label>Start <select id="sel-start"></select></label>
    <label>Target <select id="sel-target"></select></label>
    <div class="btn-group">
      <button id="btn-play" onclick="stepPlay()"><i class="ti ti-player-play" aria-hidden="true"></i> Play</button>
      <button id="btn-step" onclick="stepOnce()">Step →</button>
      <button id="btn-undo" onclick="undoStep()" disabled><i class="ti ti-arrow-back-up" aria-hidden="true"></i> Undo</button>
      <button onclick="resetViz()"><i class="ti ti-refresh" aria-hidden="true"></i> Reset</button>
    </div>
    <label>Speed
      <input type="range" id="speed" min="1" max="5" value="3" step="1" style="width:70px;vertical-align:middle">
    </label>
  </div>

  <div class="canvas-wrap">
    <canvas id="gc" height="360"></canvas>
  </div>

  <div class="status-bar">
    <span><span class="dot" style="background:#3B8BD4"></span>Unvisited</span>
    <span><span class="dot" style="background:#EF9F27"></span>In stack/queue</span>
    <span><span class="dot" style="background:#639922"></span>Visited</span>
    <span><span class="dot" style="background:#E24B4A"></span>Target</span>
    <span><span class="dot" style="background:#D85A30"></span>Found!</span>
    <span id="algo-label" style="margin-left:auto;font-weight:600;color:var(--color-text-primary)">Algorithm: DFS (Stack)</span>
  </div>

  <div class="log-area">
    <div class="log-box" id="log-main">
      <h3 id="log-title">DFS Log</h3>
      <div id="log-entries"></div>
    </div>
    <div class="log-box" id="log-struct">
      <h3 id="struct-title">Stack (LIFO)</h3>
      <div id="struct-entries"></div>
    </div>
  </div>
</div>

<script>
// Definisi Graf & Posisi Visual
const EDGES = [[0,1],[0,2],[1,3],[1,4],[2,5],[2,6],[3,7],[4,8],[5,9]];
const N = 10;
const adj = Array.from({length:N},()=>[]);
EDGES.forEach(([p,c]) => adj[p].push(c));

const NODE_POS = [
  [340,40],
  [200,110],[480,110],
  [120,190],[280,190],[400,190],[560,190],
  [80,280],[280,280],[400,280]
];

const COLORS = {
  unvisited: '#3B8BD4',
  inStruct:  '#EF9F27',
  visited:   '#639922',
  target:    '#E24B4A',
  found:     '#D85A30',
  current:   '#a855f7',
};

const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');

let algo = 'dfs';
let startNode = 0, targetNode = 8;
let vizState = null;
let history = []; 
let logHistory = []; 
let playing = false;
let playTimer = null;

function speedMs() {
  const v = +document.getElementById('speed').value;
  return [800,550,350,200,80][v-1];
}

function cloneState(s) {
  if (!s) return null;
  const base = {
    visited: [...s.visited],
    done: s.done,
    found: s.found,
    current: s.current,
    inStruct: new Set(s.inStruct),
  };
  if (algo === 'dfs') base.stack = [...s.stack];
  else base.queue = [...s.queue];
  return base;
}

function saveSnapshot() {
  history.push(cloneState(vizState));
  logHistory.push({
    log: document.getElementById('log-entries').innerHTML,
    struct: document.getElementById('struct-entries').innerHTML,
  });
  updateUndoBtn();
}

function updateUndoBtn() {
  document.getElementById('btn-undo').disabled = history.length === 0 || playing;
}

function initSelects() {
  ['sel-start','sel-target'].forEach(id => {
    const s = document.getElementById(id);
    s.innerHTML = '';
    for (let i=0;i<N;i++) { const o=document.createElement('option'); o.value=i; o.textContent='Node '+i; s.appendChild(o); }
  });
  document.getElementById('sel-start').value = 0;
  document.getElementById('sel-target').value = 8;
  document.getElementById('sel-start').onchange = () => { startNode=+document.getElementById('sel-start').value; resetViz(); };
  document.getElementById('sel-target').onchange = () => { targetNode=+document.getElementById('sel-target').value; resetViz(); };
}

function setAlgo(a) {
  algo = a;
  document.getElementById('btn-dfs').classList.toggle('active', a==='dfs');
  document.getElementById('btn-bfs').classList.toggle('active', a==='bfs');
  document.getElementById('algo-label').textContent = a==='dfs'?'Algorithm: DFS (Stack)':'Algorithm: BFS (Queue)';
  document.getElementById('log-title').textContent = a==='dfs'?'DFS Log':'BFS Log';
  document.getElementById('struct-title').textContent = a==='dfs'?'Stack (LIFO)':'Queue (FIFO)';
  resetViz();
}

function resetViz() {
  stopPlay();
  history = [];
  logHistory = [];
  if (algo==='dfs') initDFS(); else initBFS();
  drawGraph();
  document.getElementById('log-entries').innerHTML = '';
  document.getElementById('struct-entries').innerHTML = '';
  document.getElementById('btn-step').disabled = false;
  document.getElementById('btn-play').disabled = false;
  updateUndoBtn();
  if (algo==='dfs') {
    addLog(`PUSH node ${startNode} → stack`, 'push');
    updateStructLog([startNode], 'stack');
  } else {
    addLog(`ADD node ${startNode} → queue`, 'push');
    updateStructLog([startNode], 'queue');
  }
}

function initDFS() {
  vizState = {
    visited: new Array(N).fill(false),
    stack: [startNode],
    done: false,
    found: false,
    current: null,
    inStruct: new Set([startNode]),
  };
}

function initBFS() {
  const vis = new Array(N).fill(false);
  vis[startNode] = true;
  vizState = {
    visited: vis,
    queue: [startNode],
    done: false,
    found: false,
    current: null,
    inStruct: new Set([startNode]),
  };
}

function stepOnce() {
  if (!vizState || vizState.done) return;
  saveSnapshot();
  if (algo==='dfs') stepDFS(); else stepBFS();
  drawGraph();
}

function undoStep() {
  if (history.length === 0) return;
  stopPlay();
  vizState = history.pop();
  const logs = logHistory.pop();
  document.getElementById('log-entries').innerHTML = logs.log;
  document.getElementById('struct-entries').innerHTML = logs.struct;
  document.getElementById('log-main').scrollTop = document.getElementById('log-main').scrollHeight;
  document.getElementById('log-struct').scrollTop = document.getElementById('log-struct').scrollHeight;
  drawGraph();
  updateUndoBtn();
  document.getElementById('btn-step').disabled = false;
  document.getElementById('btn-play').disabled = false;
}

function stepDFS() {
  const s = vizState;
  if (s.stack.length === 0) { s.done=true; addLog('Search complete — node not found.','info'); return; }
  const node = s.stack.pop();
  s.inStruct.delete(node);
  s.current = node;
  addLog(`POP node ${node} from stack`, 'pop');
  updateStructLog([...s.stack], 'stack');
  if (!s.visited[node]) {
    s.visited[node] = true;
    addLog(`[DFS] Scanning node ${node}`, 'scan');
    if (node === targetNode) {
      s.done=true; s.found=true;
      addLog(`✓ FOUND node ${targetNode}!`, 'found');
      stopPlay(); return;
    }
    const children = adj[node];
    for (let i=children.length-1;i>=0;i--) {
      const c = children[i];
      if (!s.visited[c]) {
        s.stack.push(c);
        s.inStruct.add(c);
        addLog(`  PUSH child ${c}`, 'push');
      }
    }
    updateStructLog([...s.stack], 'stack');
  }
  if (s.stack.length === 0 && !s.found) { s.done=true; addLog('Search complete — node not found.','info'); }
}

function stepBFS() {
  const s = vizState;
  if (s.queue.length === 0) { s.done=true; addLog('Search complete — node not found.','info'); return; }
  const node = s.queue.shift();
  s.inStruct.delete(node);
  s.current = node;
  addLog(`REMOVE node ${node} from queue`, 'pop');
  updateStructLog([...s.queue], 'queue');
  addLog(`[BFS] Scanning node ${node}`, 'scan');
  if (node === targetNode) {
    s.done=true; s.found=true;
    addLog(`✓ FOUND node ${targetNode}!`, 'found');
    stopPlay(); return;
  }
  adj[node].forEach(c => {
    if (!s.visited[c]) {
      s.visited[c] = true;
      s.queue.push(c);
      s.inStruct.add(c);
      addLog(`  ADD child ${c} → queue`, 'push');
    }
  });
  updateStructLog([...s.queue], 'queue');
  if (s.queue.length === 0 && !s.found) { s.done=true; addLog('Search complete — node not found.','info'); }
}

function addLog(msg, type='info') {
  const div = document.getElementById('log-entries');
  const e = document.createElement('div');
  e.className = 'log-entry' + (type==='found'?' found':type==='scan'?' scan':'');
  e.textContent = msg;
  div.appendChild(e);
  div.parentElement.scrollTop = div.parentElement.scrollHeight;
}

function updateStructLog(items, type) {
  const div = document.getElementById('struct-entries');
  if (items.length === 0) { div.textContent = '(empty)'; return; }
  div.innerHTML = items.map((v,i)=>`<div class="log-entry">${(type==='stack'&&i===items.length-1)||(type==='queue'&&i===0)?'→ ':'  '}node ${v}</div>`).reverse().join('');
}

function stepPlay() {
  if (playing) { stopPlay(); return; }
  if (vizState?.done) { resetViz(); return; }
  playing = true;
  document.getElementById('btn-play').innerHTML = '<i class="ti ti-player-pause" aria-hidden="true"></i> Pause';
  updateUndoBtn();
  function tick() {
    if (!vizState?.done) {
      stepOnce();
      playTimer = setTimeout(tick, speedMs());
    } else {
      stopPlay();
    }
  }
  tick();
}

function stopPlay() {
  playing = false;
  clearTimeout(playTimer);
  document.getElementById('btn-play').innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> Play';
  updateUndoBtn();
}

function nodeColor(i) {
  if (!vizState) return COLORS.unvisited;
  if (i === targetNode && vizState.found && vizState.current===i) return COLORS.found;
  if (i === targetNode) return COLORS.target;
  if (vizState.current === i) return COLORS.current;
  if (vizState.visited[i]) return COLORS.visited;
  if (vizState.inStruct?.has(i)) return COLORS.inStruct;
  return COLORS.unvisited;
}

function drawGraph() {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth;
  const H = 360;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);

  const scaleX = W / 680;
  const scaleY = H / 360;
  const scale = Math.min(scaleX, scaleY);
  const offsetX = (W - 680*scale)/2;
  const offsetY = (H - 360*scale)/2;

  function tx(x) { return x*scale + offsetX; }
  function ty(y) { return y*scale + offsetY; }
  const r = 22 * scale;

  ctx.clearRect(0, 0, W, H);

  EDGES.forEach(([p,c]) => {
    const [px,py] = NODE_POS[p];
    const [cx,cy] = NODE_POS[c];
    const dx=cx-px, dy=cy-py, len=Math.hypot(dx,dy);
    const ux=dx/len, uy=dy/len;
    const x1=tx(px)+ux*r, y1=ty(py)+uy*r;
    const x2=tx(cx)-ux*r, y2=ty(cy)-uy*r;
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.strokeStyle = 'rgba(128,128,128,0.35)';
    ctx.lineWidth = 1.5*scale;
    ctx.stroke();
    const angle = Math.atan2(y2-y1, x2-x1);
    const al = 10*scale;
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - al*Math.cos(angle-0.4), y2 - al*Math.sin(angle-0.4));
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - al*Math.cos(angle+0.4), y2 - al*Math.sin(angle+0.4));
    ctx.strokeStyle = 'rgba(128,128,128,0.5)';
    ctx.lineWidth = 1.2*scale;
    ctx.stroke();
  });

  NODE_POS.forEach(([x,y],i) => {
    const cx2=tx(x), cy2=ty(y);
    const col = nodeColor(i);
    ctx.beginPath();
    ctx.arc(cx2,cy2,r,0,Math.PI*2);
    ctx.fillStyle = col + '22';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx2,cy2,r,0,Math.PI*2);
    ctx.strokeStyle = col;
    ctx.lineWidth = 2*scale;
    ctx.stroke();
    ctx.fillStyle = col;
    ctx.font = `${Math.round(13*scale)}px var(--font-sans, sans-serif)`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(i, cx2, cy2);
  });

  const [sx,sy] = NODE_POS[startNode];
  const [gx,gy] = NODE_POS[targetNode];
  ctx.font = `${Math.round(11*scale)}px var(--font-sans, sans-serif)`;
  ctx.fillStyle = COLORS.visited;
  ctx.textAlign = 'center';
  ctx.fillText('start', tx(sx), ty(sy)-r-8*scale);
  ctx.fillStyle = COLORS.target;
  ctx.fillText('target', tx(gx), ty(gy)+r+12*scale);
}

window.addEventListener('resize', drawGraph);
initSelects();
resetViz();
</script>
</body>
</html>
